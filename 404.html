<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链接不存在 - 短链接系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#333}
.error-box{background:#fff;border-radius:20px;padding:50px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);max-width:420px;width:90%}
.error-box h1{font-size:72px;color:#667eea;margin-bottom:10px}
.error-box h2{font-size:20px;color:#555;margin-bottom:15px}
.error-box p{color:#888;margin-bottom:30px;line-height:1.6}
.error-box a{display:inline-block;padding:12px 36px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;border-radius:30px;font-size:15px;transition:transform 0.2s}
.error-box a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="error-box">
    <h1>404</h1>
    <h2>链接不存在或已失效</h2>
    <p>您访问的短链接可能已被删除、禁用，或者地址输入有误。</p>
    <a href="./">返回首页</a>
</div>
</body>
</html>
